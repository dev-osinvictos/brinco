<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brinco de Ouro da Princesa Vivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Open+Sans&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Open Sans', sans-serif;
      color: #fff;
    }

    .hero {
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7)),
                  url('img/background_desktop.png') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: #FFD700;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }

    .cta {
      background-color: #006837;
      color: #fff;
      padding: 1rem 2rem;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.3s ease;
      display: inline-block;
      text-decoration: none;
    }

    .cta:hover {
      background-color: #004d28;
    }

    .links {
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .link-btn {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 215, 0, 0.6);
      color: #FFD700;
      padding: 0.65rem 1rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .link-btn:hover {
      background: rgba(0, 0, 0, 0.65);
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      h2 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Brinco de Ouro da Princesa Vivo</h1>
    <h2>Proposta para Exploração do Bosque Bugrino</h2>
    <a class="cta" href="pdf/1-businessplan_bv.html">Conheça a proposta</a>
    <div class="links">
      <a class="link-btn" href="pdf/1-businessplan_bv.html">Business Plan</a>
      <a class="link-btn" href="pdf/1-onepager_bv.html">One Pager</a>
      <a class="link-btn" href="pdf/1-storytelling_bv.html">Storytelling</a>
      <a class="link-btn" href="pdf/1-whitepaper-brinco.html">Whitepaper</a>
    </div>
  </div>

</body>
</html>
